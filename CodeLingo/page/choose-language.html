<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вибір мови</title>
    <link rel="stylesheet" href="../css/choose-language.css">
    <link rel="stylesheet" href="../css/main.css">
</head>
<body>

<div class="container">

    <h1>З якої мови почнемо?</h1>

    <div class="languages">

        <div class="lang-card" onclick="selectLang(this, 'en')">C#</div>
        <div class="lang-card" onclick="selectLang(this, 'de')">C++</div>
        <div class="lang-card" onclick="selectLang(this, 'pl')">Css</div>
        <div class="lang-card" onclick="selectLang(this, 'es')">HTML</div>

    </div>

    <p id="error" class="error"></p>

    <button onclick="confirmLang()">Обрати мову</button>

</div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="../js/choose-language.js"></script>
<script src="../js/main.js"></script>

</body>
</html>
