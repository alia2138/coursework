<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>CodeLingo</title>
    <link rel="stylesheet" href="../css/home.css">
</head>
<body>

<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <!-- ВЕРХ -->
        <div class="sidebar-top">
            <h1 class="logo">CodeLingo</h1>

            <div class="menu">
                <div class="menu-item active">💻 C#</div>
                <div class="menu-item">🐍 Python</div>
                <div class="menu-item">🌐 JavaScript</div>
                <div class="menu-item">☕ Java</div>
            </div>
        </div>

        <!-- НИЗ -->
        <div class="sidebar-bottom">
            <button class="shop-btn" onclick="goToShop()">🛒 Магазин</button>
        </div>

    </aside>

    <!-- MAIN -->
    <main class="main">

        <div class="topbar">
            <div class="stat">🔥 5</div>
            <div class="stat">❤️ 3</div>
            <div class="stat">💎 120</div>
        </div>

        <!-- ПРОГРЕС -->
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" style="width: 40%;"></div>
            </div>
            <p>Прогрес: 40%</p>
        </div>

        <!-- РІВНІ -->
        <div class="levels-container">

            <div class="level-card">
                <div>
                    <div class="level-number">Рівень 1</div>
                    <div class="level-title">Основи C#</div>
                </div>
                <div>▶</div>
            </div>

            <div class="level-card">
                <div>
                    <div class="level-number">Рівень 2</div>
                    <div class="level-title">Змінні</div>
                </div>
                <div>▶</div>
            </div>

            <div class="level-card">
                <div>
                    <div class="level-number">Рівень 3</div>
                    <div class="level-title">Умови</div>
                </div>
                <div>▶</div>
            </div>

            <div class="level-card locked">
                <div>
                    <div class="level-number">Рівень 4</div>
                    <div class="level-title">Цикли</div>
                </div>
                <div>🔒</div>
            </div>

        </div>

    </main>

</div>

<script src="../js/main.js"></script>
</body>
</html>
